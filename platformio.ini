; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
monitor_filters = time, default
board_build.partitions = min_spiffs.csv
build_flags =
    -I include
    -D FIRMWARE_VERSION='"1.0.0"'
    -D ARDUINO_LOOP_STACK_SIZE=16384

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7

test_framework = unity
test_build_src = false

; Native test environment (runs on host, no hardware needed)
[env:native]
platform = native
build_flags = -std=c++11 -I lib/config_store
test_framework = unity
test_ignore = test_config_store, test_sensor
lib_ignore = config_store
build_src_filter = -<*>
